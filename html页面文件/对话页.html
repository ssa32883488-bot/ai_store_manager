<body class="bg-surface font-body text-on-surface min-h-screen pb-40">

<button class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-primary-container text-white rounded-full flex items-center justify-center active:scale-90 transition-transform shadow-md">
<span class="material-symbols-outlined" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
</div>

</div>
<span class="text-lg font-semibold text-on-surface-variant group-hover:text-primary">点击拍摄 / 从相册选取</span>
</div>
</div>

<div class="bg-surface-container-low rounded-lg p-6 flex gap-4 items-start border-l-4 border-primary">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lightbulb">lightbulb</span>
<p class="text-on-surface-variant leading-relaxed">

</div>
</div>
</section>

<button class="p-6 rounded-lg bg-surface-container-lowest border-2 border-primary text-primary flex flex-col items-center gap-3 shadow-md">
<span class="material-symbols-outlined text-4xl" data-icon="filter_vintage">filter_vintage</span>

</button>
<button class="p-6 rounded-lg bg-surface-container-lowest border-2 border-transparent text-on-surface flex flex-col items-center gap-3 hover:bg-surface-container-low transition-colors">

<span class="text-xl font-bold">温馨暖阳</span>
</button>
<button class="p-6 rounded-lg bg-surface-container-lowest border-2 border-transparent text-on-surface flex flex-col items-center gap-3 hover:bg-surface-container-low transition-colors">

</button>

<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface font-bold text-lg">小红书</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface font-bold text-lg">抖音图文</button>
</div>
</div>
<div class="space-y-4">

<span class="material-symbols-outlined text-primary" data-icon="edit_note">edit_note</span>

<button class="px-6 py-3 rounded-full bg-primary-container text-white font-bold text-lg shadow-sm">新品上市</button>
<button class="px-6 py-3 rounded-full bg-surface-container-high text-on-surface font-bold text-lg">走心打卡</button>
</div>
</div>
<div class="p-6 bg-primary/5 rounded-lg border-2 border-primary/10">
<p class="text-primary font-bold text-lg text-center">✨ AI 已准备就绪，为你生成最佳文案</p>
</div>
</section>

<!-- BottomNavBar Style Execution -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-surface dark:bg-[#191c1e] rounded-t-[2rem] px-6 py-8 shadow-[0_-12px_32px_rgba(25,28,30,0.06)]">
<div class="max-w-xl mx-auto flex flex-col gap-4">
<!-- Inactive (Back) State shown only when not in step 1 -->
<button class="text-[#191c1e] dark:text-[#f8f9fb] font-semibold px-8 py-2 flex items-center justify-center hover:opacity-90 active:scale-[0.96] transition-transform duration-200 hidden">

</button>
<!-- Example Step 4 CTA (Hidden initially) -->
<button class="hidden bg-gradient-to-br from-[#006c49] to-[#10b981] text-white rounded-lg px-12 py-5 flex items-center justify-center grow shadow-lg hover:opacity-90 active:scale-[0.96] transition-transform duration-200 font-headline font-bold text-xl">
                ⚡ 开始一键生成
